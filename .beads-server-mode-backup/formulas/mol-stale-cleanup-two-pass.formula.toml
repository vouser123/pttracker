formula = "mol-stale-cleanup-two-pass"
description = "Two-pass backlog cleanup workflow: flag first, determine second, with explicit evidence and escalation thresholds."
version = 1
type = "workflow"

[vars.cleanup_container]
description = "Parent cleanup bead that should own the instantiated workflow"
default = "pt-fegm"

[vars.scope_label]
description = "Short label describing the current cleanup scope"
default = "open non-epic beads"

[vars.pass1_rule]
description = "Pass-1 rule reminder"
default = "Flag only. Do not close beads in pass 1 except obvious accidental duplicates if explicitly allowed."

[vars.escalation_rule]
description = "When to elevate items instead of acting directly"
default = "Elevate mid-confidence or product/process-sensitive items to the user."

[[steps]]
id = "prepare-scope"
title = "Prepare stale cleanup scope for {{scope_label}}"
type = "task"
description = """
Confirm the cleanup container and working scope before scanning.

- Attach this workflow under {{cleanup_container}}.
- Verify the target set for this run is {{scope_label}}.
- Restate the operating rule: {{pass1_rule}}
- Do not create stray top-level cleanup beads for this run.
"""
labels = ["cleanup:workflow", "cleanup:pass:prepare"]

[[steps]]
id = "pass1-scan"
title = "Pass 1 scan {{scope_label}}"
type = "task"
needs = ["prepare-scope"]
description = """
Review the target backlog slice and identify candidates for cleanup review.

Required decision posture:
- Work from the full scoped set, not only already-labeled beads.
- Separate suspicion from determination.
- Do not close items in this step.

For each candidate, collect evidence for:
- last_touched_age
- has_open_children
- has_parent
- matches_current_repo_shape
- decision_already_recorded
- implementation_already_landed
- active_blocker_still_real
"""
labels = ["cleanup:workflow", "cleanup:pass:1", "cleanup:phase:scan"]

[[steps]]
id = "pass1-flag"
title = "Pass 1 flag candidates for {{scope_label}}"
type = "task"
needs = ["pass1-scan"]
description = """
Apply cleanup candidate labels and leave a short evidence note for each flagged bead.

Required labels:
- cleanup:candidate
- cleanup:reason:resolved-open | obsolete-context | duplicate | process-stale | unclear-scope | defer-instead
- cleanup:confidence:0.9 | 0.8 | 0.7 | 0.6 | 0.5

Pass-1 policy:
- Flag only when confidence is 0.5 or higher.
- Use labels for filtering and one short note for the evidence summary.
- Do not determine final outcomes yet.
"""
labels = ["cleanup:workflow", "cleanup:pass:1", "cleanup:phase:flag"]

[[steps]]
id = "pass1-batch"
title = "Batch flagged cleanup candidates for {{scope_label}}"
type = "task"
needs = ["pass1-flag"]
description = """
Create the pass-1 review set before any pass-2 actions happen.

- Group highest-confidence candidates first.
- Separate items that can likely be acted on from items that need elevation.
- Keep the flagged list intact so a later pass can work from one review set.
"""
labels = ["cleanup:workflow", "cleanup:pass:1", "cleanup:phase:batch"]

[[steps]]
id = "pass2-high-confidence"
title = "Pass 2 determine high-confidence cleanup candidates"
type = "task"
needs = ["pass1-batch"]
description = """
Review the highest-confidence candidates and take the allowed action when evidence is strong.

Decision guidance:
- 0.85+ can usually be acted on directly unless product intent would change.
- Available outcomes: close as completed, close as obsolete, defer with explicit reason/date, or keep open and clear cleanup labels.
- Remove cleanup labels from items whose final state is resolved in this step.
"""
labels = ["cleanup:workflow", "cleanup:pass:2", "cleanup:phase:determine"]

[[steps]]
id = "pass2-elevate"
title = "Elevate mid-confidence cleanup candidates"
type = "human"
needs = ["pass1-batch"]
description = """
Prepare the user-facing review set for items that should not be decided unilaterally.

Decision guidance:
- 0.60-0.84 may need batching for approval depending on product/process impact.
- 0.40-0.59 should be elevated instead of decided directly.
- Keep cleanup labels on elevated items until a decision is recorded.
- Use this rule: {{escalation_rule}}
"""
labels = ["cleanup:workflow", "cleanup:pass:2", "cleanup:phase:elevate"]

[[steps]]
id = "pass2-closeout"
title = "Close out stale cleanup run for {{scope_label}}"
type = "task"
needs = ["pass2-high-confidence", "pass2-elevate"]
description = """
Finalize the run and leave the tracker cleaner than you found it.

- Remove cleanup labels from items that were reviewed and kept open.
- Keep labels only on items intentionally awaiting user input.
- Add a short summary note to the container or workflow root with actions taken, elevated items, and remaining scope.
- Confirm whether the next scope should move to epics or decisions/process beads.
"""
labels = ["cleanup:workflow", "cleanup:phase:closeout"]
