formula = "mol-open-bead-truth-pass"
description = "Batch cleanup pass for remaining open or in-progress beads: preflight the scope, identify candidates, fan out thin per-bead truth-check arms, and aggregate recommendations."
version = 1
type = "workflow"

[vars.scope_label]
description = "Open-bead slice being reviewed"
default = "remaining open and in_progress beads"

[vars.selection_rule]
description = "Rule for deciding which beads need a truth-check arm"
default = "spawn an arm for each bead whose current truth cannot be established from the existing tracker state alone"

[vars.aggregate_goal]
description = "What the aggregate step should produce"
default = "a batch of evidence-backed recommendations for keep_open, close_completed, close_obsolete, or elevate"

[[steps]]
id = "preflight-cleanout"
title = "Preflight cleanup for {{scope_label}}"
type = "task"
description = """
Prepare the cleanup pass before any fanout.

- Work only from the live open and in_progress scope.
- Ignore closed beads.
- Do not use older cleanup labels or notes as proof that a bead is still real or already resolved.
- This parent workflow can remain durable when the cleanup graph itself is useful to keep visible.
"""
labels = ["cleanup:truth-pass", "cleanup:phase:preflight"]

[[steps]]
id = "survey-open-scope"
title = "Survey {{scope_label}}"
type = "task"
needs = ["preflight-cleanout"]
description = """
Survey the current scope before spawning per-bead arms.

- Work from open and in_progress beads in the selected scope.
- Do not close or relabel target beads in this step.
- Prepare the candidate set for truth-check fanout.
"""
labels = ["cleanup:truth-pass", "cleanup:phase:survey"]

[[steps]]
id = "identify-candidates"
title = "Identify truth-check candidates in {{scope_label}}"
type = "task"
needs = ["survey-open-scope"]
description = """
Identify which beads need a current-state truth-check arm.

Selection rule:
- {{selection_rule}}

For each candidate, prepare explicit arm variables:
- target_bead
- target_title
- evidence_scope
- candidate_reason
- current_status
- current_parent
- current_assignee
"""
labels = ["cleanup:truth-pass", "cleanup:phase:select"]

[[steps]]
id = "fanout-truth-check-arms"
title = "Fan out per-bead truth-check arms for {{scope_label}}"
type = "task"
needs = ["identify-candidates"]
description = """
Spawn one thin ephemeral mol-bead-truth-check arm per candidate bead.

Required fanout pattern:
- use dynamic bonding with readable child refs
- prefer `bd mol bond mol-bead-truth-check <survey-step-id> --ref arm-{{target_bead}} --var ... --ephemeral`
- pass explicit per-arm variables for bead id, title, evidence scope, candidate reason, status, parent, and assignee
- keep each arm scoped to one target bead
- keep the arms as temporary cleanup scaffolding even when the parent run is durable
- do not leave target-bead decisions stranded only on the arms

Do not aggregate by hand before the arms run.
"""
labels = ["cleanup:truth-pass", "cleanup:phase:fanout"]

[[steps]]
id = "aggregate-findings"
title = "Aggregate truth-check findings for {{scope_label}}"
type = "human"
needs = ["fanout-truth-check-arms"]
description = """
Aggregate the per-bead arm outputs into a batch recommendation set.

Aggregate output should list, for each bead:
- target_bead
- finding
- recommended_disposition
- concrete evidence summary
- question_for_user only when needed

Aggregate goal:
- {{aggregate_goal}}
"""
labels = ["cleanup:truth-pass", "cleanup:phase:aggregate"]
