formula = "mol-standard-task"
description = "Default PT Tracker workflow for ordinary work: confirm scope, shape the work, verify, update tracker state, and close cleanly."
version = 1
type = "workflow"

[vars.work_label]
description = "Short description of the work being performed"
default = "current task"

[vars.parent_bead]
description = "Existing parent or container bead when one already exists"
default = ""

[vars.verification_mode]
description = "Expected verification path for this task"
default = "repo-appropriate verification"

[vars.multi_agent_note]
description = "Ownership reminder when another agent is involved"
default = "If another agent is involved, record explicit file or responsibility boundaries before implementation continues."

[vars.docs_note]
description = "Reminder for README or docs updates when workflow or file ownership changes"
default = "Update README and related docs when file ownership, workflow, or reusable patterns materially change."

[[steps]]
id = "confirm-scope"
title = "Confirm scope for {{work_label}}"
type = "task"
description = """
Confirm what this task is actually responsible for before changing code or tracker state.

- Restate the exact scoped outcome for {{work_label}}.
- Identify whether an existing parent bead already owns this work: {{parent_bead}}
- Confirm whether this is implementation, investigation, verification, or tracker-only work.
- Note any product, UX, or data-safety decision that would require user escalation.
"""
labels = ["workflow:standard-task", "workflow:phase:scope"]

[[steps]]
id = "shape-work"
title = "Shape the work for {{work_label}}"
type = "task"
needs = ["confirm-scope"]
description = """
Decide whether the work should stay a single scoped effort or be split before execution.

Use this size-and-shape rule:
- If the work is still one clear scoped change, continue in this workflow.
- If the work spans multiple domains, unclear child steps, or would create hidden follow-up work, stop and create or attach the needed child beads before continuing.
- If another agent is involved, apply this note now: {{multi_agent_note}}

Do not continue into execution while ownership or task shape is still ambiguous.
"""
labels = ["workflow:standard-task", "workflow:phase:shape"]

[[steps]]
id = "do-work"
title = "Do the scoped work for {{work_label}}"
type = "task"
needs = ["shape-work"]
description = """
Perform the scoped work after task shape and ownership are clear.

- Claim the active bead before work starts.
- Keep implementation inside the scoped responsibility only.
- If new out-of-scope work is discovered, create or link the follow-up bead immediately instead of silently expanding scope.
- If the task turns out to be blocked, update notes and stop instead of leaving the state ambiguous.
"""
labels = ["workflow:standard-task", "workflow:phase:execute"]

[[steps]]
id = "verify-work"
title = "Verify {{work_label}}"
type = "task"
needs = ["do-work"]
description = """
Run the expected validation path for this work.

- Use this verification mode: {{verification_mode}}
- Capture whether the task passed, failed, or is blocked on external input.
- If the task is verification-focused and it passes, plan to close it in the same pass.
- If verification fails, leave a clear failure note before moving on.
"""
labels = ["workflow:standard-task", "workflow:phase:verify"]

[[steps]]
id = "update-record"
title = "Update notes and docs for {{work_label}}"
type = "task"
needs = ["verify-work"]
description = """
Bring tracker and documentation state up to date before closure.

- Update bead notes with the outcome, follow-up links, or blocker state.
- Apply or remove labels so the bead reflects current truth.
- Use this documentation reminder when relevant: {{docs_note}}
- If no docs change is needed, note why the current docs remain accurate.
"""
labels = ["workflow:standard-task", "workflow:phase:record"]

[[steps]]
id = "close-or-escalate"
title = "Close or escalate {{work_label}}"
type = "human"
needs = ["update-record"]
description = """
Finish the workflow explicitly instead of leaving the bead half-done.

- Close the bead if the scoped work is complete.
- If the work is implemented but awaiting another thread's verification, record that exact state in notes.
- If user judgment is still required, leave a short escalation note describing the decision needed.
- Do not end the workflow with an open bead that is functionally done.
"""
labels = ["workflow:standard-task", "workflow:phase:closeout"]
